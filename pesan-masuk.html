    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SALINK">

    <!-- ================================================================ -->
    <!-- 🔥 API CONFIGURATION - GOOGLE SPREADSHEETS                       -->
    <!-- ================================================================ -->
    <script>
        // ================================================================
        // 🔥 API CONFIGURATION - GOOGLE SPREADSHEETS
        // ================================================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbzTGcN2FcOsC_rx01tUSvdw_trm2gKpJqUMyJSbYNonDYSqP5yn2ChYVc3ubWqaAyZC8A/exec';

        /**
         * 📥 Ambil semua user dari Google Sheets
         */
        async function apiGetUsers() {
            try {
                const response = await fetch(API_URL + '?action=get_users&timestamp=' + Date.now());
                if (!response.ok) throw new Error('HTTP error: ' + response.status);
                const result = await response.json();
                
                if (result.status === 'success' && result.data) {
                    localStorage.setItem('salink_users', JSON.stringify(result.data));
                    return result.data;
                }
                return null;
            } catch (error) {
                console.error('❌ Gagal get users:', error);
                return JSON.parse(localStorage.getItem('salink_users') || '[]');
            }
        }

        /**
         * 📥 Ambil semua pesan dari Google Sheets
         */
        async function apiGetMessages() {
            try {
                const response = await fetch(API_URL + '?action=get_messages&timestamp=' + Date.now());
                if (!response.ok) throw new Error('HTTP error: ' + response.status);
                const result = await response.json();
                
                if (result.status === 'success' && result.data) {
                    localStorage.setItem('salink_messages', JSON.stringify(result.data));
                    return result.data;
                }
                return null;
            } catch (error) {
                console.error('❌ Gagal get messages:', error);
                return JSON.parse(localStorage.getItem('salink_messages') || '[]');
            }
        }

        /**
         * 📤 Kirim pesan ke Google Sheets
         */
        async function apiSendMessage(messageData) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'send_message',
                        message: messageData,
                        timestamp: Date.now()
                    })
                });
                
                if (!response.ok) throw new Error('HTTP error: ' + response.status);
                const result = await response.json();
                console.log('📡 Send message result:', result);
                return result.status === 'success';
            } catch (error) {
                console.error('❌ Send message error:', error);
                return false;
            }
        }

        /**
         * 🔄 Sinkronisasi pesan ke Google Sheets
         */
        async function syncMessagesToSpreadsheet(messagesData) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'sync_messages',
                        messages: messagesData,
                        timestamp: Date.now()
                    })
                });
                
                if (!response.ok) throw new Error('HTTP error: ' + response.status);
                const result = await response.json();
                console.log('📡 Sync messages result:', result);
                return result.status === 'success';
            } catch (error) {
                console.error('❌ Sync messages error:', error);
                return false;
            }
        }

        console.log('✅ API Module Loaded - Google Spreadsheets Connected');
        console.log('📡 API URL:', API_URL);
    </script>

    <!-- ================================================================ -->
    <!-- JAVASCRIPT                                                        -->
    <!-- ================================================================ -->
    <script>
        // ================================================================
        // STATE
        // ================================================================
        let currentUser = null;
        let messages = [];
        let messageIdCounter = 0;
        let currentTheme = 'dark';
        let toastTimeout = null;
        let selectedMessageId = null;
        let isEditing = false;
        let originalMessageText = '';
        let selectedRecipient = null;
        let isSyncing = false;
        let allUsers = [];

        // ================================================================
        // LOAD THEME
        // ================================================================
        function loadTheme() {
            const savedTheme = localStorage.getItem('salink_theme');
            if (savedTheme === 'light') {
                currentTheme = 'light';
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeToggle').classList.add('active');
                document.getElementById('toggleIcon').className = 'fas fa-sun';
                const metaThemeColor = document.getElementById('themeColorMeta');
                if (metaThemeColor) metaThemeColor.content = '#f0f4f8';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            const toggleThumb = document.getElementById('toggleThumb');
            const toggleIcon = document.getElementById('toggleIcon');
            const metaThemeColor = document.getElementById('themeColorMeta');
            
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                html.setAttribute('data-theme', 'light');
                themeToggle.classList.add('active');
                toggleIcon.className = 'fas fa-sun';
                if (metaThemeColor) metaThemeColor.content = '#f0f4f8';
                localStorage.setItem('salink_theme', 'light');
            } else {
                currentTheme = 'dark';
                html.removeAttribute('data-theme');
                themeToggle.classList.remove('active');
                toggleIcon.className = 'fas fa-moon';
                if (metaThemeColor) metaThemeColor.content = '#0d1117';
                localStorage.setItem('salink_theme', 'dark');
            }
        }

        // ================================================================
        // TOAST SYSTEM
        // ================================================================
        function showToast(title, message, icon = 'fa-info-circle') {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            clearTimeout(toastTimeout);
            
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="toast-icon"><i class="fas ${icon}"></i></div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close"><i class="fas fa-times"></i></button>
            `;
            
            toast.querySelector('.toast-close').addEventListener('click', () => {
                toast.remove();
            });
            
            container.appendChild(toast);
            
            toastTimeout = setTimeout(() => {
                toast.remove();
            }, 5000);
        }

        // ================================================================
        // GET TIME AGO
        // ================================================================
        function getTimeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            const weeks = Math.floor(days / 7);
            const months = Math.floor(days / 30);
            const years = Math.floor(days / 365);
            
            if (seconds < 60) return 'Baru saja';
            if (minutes < 60) return `${minutes} menit yang lalu`;
            if (minutes < 120) return '1 jam yang lalu';
            if (hours < 24) return `${hours} jam yang lalu`;
            if (days < 7) return `${days} hari yang lalu`;
            if (weeks < 4) return `${weeks} minggu yang lalu`;
            if (months < 12) return `${months} bulan yang lalu`;
            return `${years} tahun yang lalu`;
        }

        // ================================================================
        // OPEN PROFILE USER
        // ================================================================
        function openProfileUser(username) {
            if (!username) return;
            window.open(`profile-user.html?username=${encodeURIComponent(username)}`, '_blank');
        }

        // ================================================================
        // GET ALL USERS - DENGAN SYNC DARI SPREADSHEET
        // ================================================================
        async function getAllUsers() {
            let users = JSON.parse(localStorage.getItem('salink_users') || '[]');
            
            // Coba sync dari Spreadsheet
            try {
                const remoteUsers = await apiGetUsers();
                if (remoteUsers && remoteUsers.length > 0) {
                    users = remoteUsers;
                    localStorage.setItem('salink_users', JSON.stringify(users));
                }
            } catch (e) {
                console.warn('⚠️ Gagal sync users:', e);
            }
            
            // Tambahkan current user jika belum ada
            if (currentUser && !users.find(u => u.username === currentUser.username)) {
                users.push(currentUser);
            }
            
            allUsers = users;
            return users;
        }

        // ================================================================
        // LOAD DATA - DENGAN SYNC DARI SPREADSHEET
        // ================================================================
        async function loadData() {
            // Load current user
            const savedUser = localStorage.getItem('salink_user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                } catch (e) {
                    currentUser = null;
                }
            }

            // Jika tidak ada user, redirect ke login
            if (!currentUser) {
                window.location.href = 'login.html?redirect=pesan-masuk';
                return;
            }

            // 🔥 SYNC messages dari Spreadsheet
            try {
                const remoteMessages = await apiGetMessages();
                if (remoteMessages && remoteMessages.length > 0) {
                    messages = remoteMessages;
                    let maxId = 0;
                    messages.forEach(m => {
                        const numId = parseInt(m.id.replace('msg-', ''));
                        if (!isNaN(numId) && numId > maxId) maxId = numId;
                    });
                    messageIdCounter = maxId;
                    localStorage.setItem('salink_messages', JSON.stringify(messages));
                    console.log('✅ Messages disinkronkan dari Spreadsheet:', messages.length);
                } else {
                    // Load dari localStorage
                    try {
                        const saved = localStorage.getItem('salink_messages');
                        if (saved) {
                            const parsed = JSON.parse(saved);
                            if (Array.isArray(parsed) && parsed.length > 0) {
                                messages = parsed;
                                let maxId = 0;
                                messages.forEach(m => {
                                    const numId = parseInt(m.id.replace('msg-', ''));
                                    if (!isNaN(numId) && numId > maxId) maxId = numId;
                                });
                                messageIdCounter = maxId;
                            }
                        }
                    } catch (e) {
                        console.warn('Gagal memuat messages dari localStorage:', e);
                    }
                }
            } catch (e) {
                console.warn('⚠️ Gagal sync messages:', e);
                // Fallback ke localStorage
                try {
                    const saved = localStorage.getItem('salink_messages');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (Array.isArray(parsed) && parsed.length > 0) {
                            messages = parsed;
                            let maxId = 0;
                            messages.forEach(m => {
                                const numId = parseInt(m.id.replace('msg-', ''));
                                if (!isNaN(numId) && numId > maxId) maxId = numId;
                            });
                            messageIdCounter = maxId;
                        }
                    }
                } catch (e) {
                    console.warn('Gagal memuat messages:', e);
                }
            }

            // Load users
            await getAllUsers();

            // Generate sample messages jika belum ada
            if (messages.length === 0) {
                generateSampleMessages();
            }

            renderMessages();
            
            // Cek parameter URL untuk reply atau compose langsung
            const urlParams = new URLSearchParams(window.location.search);
            const replyTo = urlParams.get('reply');
            const toUser = urlParams.get('to');
            const toName = urlParams.get('name');
            const subject = urlParams.get('subject');
            
            if (replyTo) {
                const msg = messages.find(m => m.id === replyTo);
                if (msg) {
                    setTimeout(() => {
                        openComposeModal(msg.from, msg.fromName, `RE: ${msg.subject || 'Balasan'}`);
                    }, 500);
                }
            } else if (toUser) {
                setTimeout(() => {
                    openComposeModal(toUser, toName || toUser, subject || '');
                }, 500);
            }
        }

        // ================================================================
        // GENERATE SAMPLE MESSAGES
        // ================================================================
        function generateSampleMessages() {
            const now = Date.now();
            const sampleSenders = [
                { name: 'Bpk. Ahmad', username: 'ahmad', gender: 'male' },
                { name: 'Sdri. Rina', username: 'rina', gender: 'female' },
                { name: 'Bpk. Joko', username: 'joko', gender: 'male' },
                { name: 'Sdri. Dewi', username: 'dewi', gender: 'female' },
                { name: 'Bpk. Budi', username: 'budi', gender: 'male' }
            ];

            const sampleSubjects = [
                'Pertanyaan tentang lokasi darurat',
                'Informasi penting terkini',
                'Permintaan bantuan',
                'Laporan situasi terbaru',
                'Konfirmasi kehadiran'
            ];

            const sampleMessages = [
                'Mohon informasikan lokasi titik aman terdekat di sekitar Jalan Sudirman. Ada banyak warga yang membutuhkan arahan.',
                'Saya ingin melaporkan bahwa kondisi di daerah saya sudah mulai membaik. Tim evakuasi sudah tiba di lokasi.',
                'Apakah ada informasi terbaru mengenai penanganan darurat di wilayah Jakarta Selatan? Mohon update informasinya.',
                'Saya membutuhkan bantuan untuk mengakses layanan kesehatan terdekat. Apakah ada yang bisa membantu?',
                'Terima kasih atas informasi yang diberikan. Saya akan menyebarkan ke warga sekitar.'
            ];

            sampleSenders.forEach((sender, index) => {
                const timeOffset = (index + 1) * 30 * 60000;
                const isRead = index > 2;
                
                messages.push({
                    id: 'msg-' + (++messageIdCounter),
                    from: sender.username,
                    fromName: sender.name,
                    fromGender: sender.gender,
                    to: currentUser.username,
                    subject: sampleSubjects[index % sampleSubjects.length],
                    message: sampleMessages[index % sampleMessages.length],
                    timestamp: now - timeOffset,
                    read: isRead,
                    isOwn: false
                });
            });

            // Tambahkan pesan dari user sendiri (kiriman)
            messages.push({
                id: 'msg-' + (++messageIdCounter),
                from: currentUser.username,
                fromName: currentUser.fullName,
                fromGender: currentUser.gender,
                to: 'ahmad',
                subject: 'Konfirmasi Bantuan',
                message: 'Baik, saya akan segera mengirimkan tim bantuan ke lokasi Anda. Mohon tunggu sebentar.',
                timestamp: now - 15 * 60000,
                read: true,
                isOwn: true
            });

            saveMessages();
            // 🔥 Sync ke Spreadsheet
            syncMessagesToSpreadsheet(messages);
        }

        // ================================================================
        // SAVE MESSAGES - SYNC KE SPREADSHEET
        // ================================================================
        function saveMessages() {
            try {
                localStorage.setItem('salink_messages', JSON.stringify(messages));
                // 🔥 SYNC ke Spreadsheet
                syncMessagesToSpreadsheet(messages);
            } catch (e) {
                console.warn('Gagal menyimpan messages:', e);
            }
        }

        // ================================================================
        // SYNC MESSAGES - MANUAL
        // ================================================================
        async function syncMessages() {
            if (isSyncing) return;
            isSyncing = true;
            
            const syncBtn = document.getElementById('syncBtn');
            syncBtn.disabled = true;
            syncBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sync...';
            
            try {
                const remoteMessages = await apiGetMessages();
                if (remoteMessages && remoteMessages.length > 0) {
                    // Gabungkan dengan local messages
                    const localIds = new Set(messages.map(m => m.id));
                    let newCount = 0;
                    
                    remoteMessages.forEach(rm => {
                        if (!localIds.has(rm.id)) {
                            messages.push(rm);
                            newCount++;
                        }
                    });
                    
                    // Update messageIdCounter
                    let maxId = 0;
                    messages.forEach(m => {
                        const numId = parseInt(m.id.replace('msg-', ''));
                        if (!isNaN(numId) && numId > maxId) maxId = numId;
                    });
                    messageIdCounter = maxId;
                    
                    saveMessages();
                    renderMessages();
                    showToast('✅ Berhasil', `${newCount} pesan baru disinkronkan!`, 'fa-check-circle');
                } else {
                    // Jika remote kosong, kirim local ke remote
                    await syncMessagesToSpreadsheet(messages);
                    showToast('✅ Berhasil', 'Pesan lokal disinkronkan ke Spreadsheet!', 'fa-check-circle');
                }
            } catch (error) {
                console.error('❌ Sync error:', error);
                showToast('⚠️ Error', 'Gagal sinkronisasi: ' + error.message, 'fa-exclamation-triangle');
            } finally {
                isSyncing = false;
                syncBtn.disabled = false;
                syncBtn.innerHTML = '<i class="fas fa-sync"></i> Sync';
            }
        }

        // ================================================================
        // RENDER MESSAGES
        // ================================================================
        function renderMessages() {
            const list = document.getElementById('messageList');
            list.innerHTML = '';

            // Filter pesan untuk user yang sedang login (pesan diterima atau dikirim)
            const userMessages = messages.filter(m => m.to === currentUser.username || m.from === currentUser.username);
            
            // Urutkan dari yang terbaru
            userMessages.sort((a, b) => b.timestamp - a.timestamp);

            document.getElementById('messageCount').textContent = userMessages.length;

            if (userMessages.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>Belum ada pesan</h3>
                        <p>Mulai kirim pesan ke pengguna lain</p>
                        <button class="btn-primary" id="emptyComposeBtn">
                            <i class="fas fa-pen"></i> Tulis Pesan
                        </button>
                    </div>
                `;
                document.getElementById('emptyComposeBtn')?.addEventListener('click', () => {
                    openComposeModal();
                });
                return;
            }

            userMessages.forEach(msg => {
                const isOwn = msg.from === currentUser.username;
                const displayName = isOwn ? currentUser.fullName : msg.fromName;
                const displayUsername = isOwn ? currentUser.username : msg.from;
                const isRead = msg.read || isOwn;

                const item = document.createElement('div');
                item.className = `message-item ${isRead ? 'read' : 'unread'} ${isOwn ? 'own-message' : ''}`;
                item.dataset.id = msg.id;

                const avatarIcon = isOwn 
                    ? (currentUser.gender === 'female' ? 'fa-female' : 'fa-male')
                    : (msg.fromGender === 'female' ? 'fa-female' : 'fa-male');
                const profilePic = isOwn ? currentUser.profilePicture : null;

                item.innerHTML = `
                    <div class="message-avatar" onclick="event.stopPropagation(); openProfileUser('${displayUsername}')">
                        ${profilePic ? `<img src="${profilePic}" alt="${displayName}">` : `<i class="fas ${avatarIcon}"></i>`}
                    </div>
                    <div class="message-content">
                        <div class="message-sender">
                            <span class="sender-name" onclick="event.stopPropagation(); openProfileUser('${displayUsername}')">${displayName}</span>
                            <span class="sender-username">@${displayUsername}</span>
                            ${isOwn ? '<span class="sender-badge">Anda</span>' : ''}
                        </div>
                        <div class="message-subject">${msg.subject || 'Tanpa Subjek'}</div>
                        <div class="message-preview">${msg.message.substring(0, 60)}${msg.message.length > 60 ? '...' : ''}</div>
                    </div>
                    <div class="message-time">${getTimeAgo(msg.timestamp)}</div>
                    ${!isRead ? '<div class="message-unread-dot"></div>' : ''}
                    <div class="message-actions">
                        ${isOwn ? `
                            <button class="edit-btn" onclick="event.stopPropagation(); openEditMessage('${msg.id}')" title="Edit pesan">
                                <i class="fas fa-edit"></i>
                            </button>
                        ` : ''}
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteMessage('${msg.id}')" title="Hapus pesan">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;

                item.addEventListener('click', () => {
                    openMessageDetail(msg.id);
                });

                list.appendChild(item);
            });
        }

        // ================================================================
        // OPEN MESSAGE DETAIL
        // ================================================================
        function openMessageDetail(messageId) {
            const msg = messages.find(m => m.id === messageId);
            if (!msg) return;

            selectedMessageId = messageId;
            isEditing = false;

            // Tandai sebagai sudah dibaca (kecuali pesan sendiri)
            if (!msg.read && msg.to === currentUser.username) {
                msg.read = true;
                saveMessages();
                renderMessages();
            }

            const isOwn = msg.from === currentUser.username;
            const displayName = isOwn ? currentUser.fullName : msg.fromName;
            const displayUsername = isOwn ? currentUser.username : msg.from;
            const avatarIcon = isOwn 
                ? (currentUser.gender === 'female' ? 'fa-female' : 'fa-male')
                : (msg.fromGender === 'female' ? 'fa-female' : 'fa-male');
            const profilePic = isOwn ? currentUser.profilePicture : null;

            const body = document.getElementById('detailModalBody');
            body.innerHTML = `
                <div class="message-detail-sender">
                    <div class="sender-avatar" onclick="openProfileUser('${displayUsername}')">
                        ${profilePic ? `<img src="${profilePic}" alt="${displayName}">` : `<i class="fas ${avatarIcon}"></i>`}
                    </div>
                    <div class="sender-info">
                        <div class="sender-name" onclick="openProfileUser('${displayUsername}')">${displayName}</div>
                        <div class="sender-username">@${displayUsername}</div>
                    </div>
                </div>
                <div class="message-detail-subject">${msg.subject || 'Tanpa Subjek'}</div>
                <div class="message-detail-text" id="detailMessageText" contenteditable="false">${msg.message}</div>
                <div class="message-detail-time">
                    <span><i class="far fa-clock"></i> ${new Date(msg.timestamp).toLocaleString('id-ID', {
                        weekday: 'long',
                        day: 'numeric',
                        month: 'long',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    })}</span>
                    ${isOwn ? `
                        <div class="edit-actions" id="editActions">
                            <button class="edit-toggle-btn" id="editToggleBtn" style="background:var(--bg-input);color:var(--accent-blue);border:1px solid var(--accent-blue);padding:2px 12px;border-radius:12px;font-size:0.6rem;cursor:pointer;">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;

            // Setup edit toggle untuk pesan sendiri
            if (isOwn) {
                const editToggleBtn = document.getElementById('editToggleBtn');
                if (editToggleBtn) {
                    editToggleBtn.addEventListener('click', function() {
                        toggleEditMode();
                    });
                }
            }

            // Setup footer
            const footer = document.getElementById('detailModalFooter');
            footer.innerHTML = `
                ${!isOwn ? `
                    <a href="#" class="btn-reply" id="replyBtn">
                        <i class="fas fa-reply"></i> Balas Pesan
                    </a>
                ` : ''}
                <button class="btn-delete-modal" id="deleteFromDetailBtn">
                    <i class="fas fa-trash"></i> Hapus Pesan
                </button>
                <button class="btn-close-modal" id="detailModalCloseBtn">Tutup</button>
            `;

            // Event listener reply
            const replyBtn = document.getElementById('replyBtn');
            if (replyBtn) {
                replyBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    closeDetailModal();
                    openComposeModal(displayUsername, displayName, `RE: ${msg.subject || 'Balasan'}`);
                });
            }

            // Event listener delete from detail
            document.getElementById('deleteFromDetailBtn').addEventListener('click', function() {
                deleteMessage(messageId);
                closeDetailModal();
            });

            // Event listener close
            document.getElementById('detailModalCloseBtn').addEventListener('click', closeDetailModal);

            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';

            // Simpan original text untuk cancel edit
            originalMessageText = msg.message;
        }

        // ================================================================
        // TOGGLE EDIT MODE
        // ================================================================
        function toggleEditMode() {
            if (!selectedMessageId) return;
            const msg = messages.find(m => m.id === selectedMessageId);
            if (!msg) return;
            if (msg.from !== currentUser.username) return;

            isEditing = !isEditing;
            const textEl = document.getElementById('detailMessageText');
            const editActions = document.getElementById('editActions');

            if (isEditing) {
                textEl.contentEditable = 'true';
                textEl.classList.add('editable');
                textEl.focus();
                editActions.innerHTML = `
                    <button class="save-edit" id="saveEditBtn" style="background:var(--accent-blue-gradient);color:#fff;border:none;padding:2px 12px;border-radius:12px;font-size:0.6rem;cursor:pointer;">
                        <i class="fas fa-save"></i> Simpan
                    </button>
                    <button class="cancel-edit" id="cancelEditBtn" style="background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border-color);padding:2px 12px;border-radius:12px;font-size:0.6rem;cursor:pointer;">
                        Batal
                    </button>
                `;

                document.getElementById('saveEditBtn').addEventListener('click', function() {
                    saveEditMessage();
                });

                document.getElementById('cancelEditBtn').addEventListener('click', function() {
                    cancelEditMessage();
                });

                // Save on Ctrl+Enter
                textEl.addEventListener('keydown', function(e) {
                    if (e.ctrlKey && e.key === 'Enter') {
                        saveEditMessage();
                    }
                });

            } else {
                textEl.contentEditable = 'false';
                textEl.classList.remove('editable');
                textEl.textContent = originalMessageText;
                editActions.innerHTML = `
                    <button class="edit-toggle-btn" id="editToggleBtn" style="background:var(--bg-input);color:var(--accent-blue);border:1px solid var(--accent-blue);padding:2px 12px;border-radius:12px;font-size:0.6rem;cursor:pointer;">
                        <i class="fas fa-edit"></i> Edit
                    </button>
                `;
                document.getElementById('editToggleBtn').addEventListener('click', function() {
                    toggleEditMode();
                });
            }
        }

        // ================================================================
        // SAVE EDIT MESSAGE
        // ================================================================
        function saveEditMessage() {
            if (!selectedMessageId) return;
            const msg = messages.find(m => m.id === selectedMessageId);
            if (!msg) return;
            if (msg.from !== currentUser.username) return;

            const textEl = document.getElementById('detailMessageText');
            const newText = textEl.textContent.trim();

            if (newText === '') {
                showToast('⚠️ Error', 'Pesan tidak boleh kosong', 'fa-exclamation-triangle');
                return;
            }

            if (newText === originalMessageText) {
                showToast('ℹ️ Info', 'Tidak ada perubahan', 'fa-info-circle');
                toggleEditMode();
                return;
            }

            msg.message = newText;
            saveMessages();
            renderMessages();
            isEditing = false;
            showToast('✅ Berhasil', 'Pesan berhasil diedit', 'fa-check-circle');
            
            // Refresh detail
            openMessageDetail(selectedMessageId);
        }

        // ================================================================
        // CANCEL EDIT MESSAGE
        // ================================================================
        function cancelEditMessage() {
            isEditing = false;
            const textEl = document.getElementById('detailMessageText');
            textEl.contentEditable = 'false';
            textEl.classList.remove('editable');
            textEl.textContent = originalMessageText;
            
            const editActions = document.getElementById('editActions');
            editActions.innerHTML = `
                <button class="edit-toggle-btn" id="editToggleBtn" style="background:var(--bg-input);color:var(--accent-blue);border:1px solid var(--accent-blue);padding:2px 12px;border-radius:12px;font-size:0.6rem;cursor:pointer;">
                    <i class="fas fa-edit"></i> Edit
                </button>
            `;
            document.getElementById('editToggleBtn').addEventListener('click', function() {
                toggleEditMode();
            });
            
            showToast('ℹ️ Info', 'Perubahan dibatalkan', 'fa-info-circle');
        }

        // ================================================================
        // OPEN EDIT MESSAGE (dari list)
        // ================================================================
        function openEditMessage(messageId) {
            const msg = messages.find(m => m.id === messageId);
            if (!msg) return;
            if (msg.from !== currentUser.username) {
                showToast('⚠️ Error', 'Anda tidak dapat mengedit pesan orang lain', 'fa-exclamation-triangle');
                return;
            }
            openMessageDetail(messageId);
            setTimeout(() => {
                toggleEditMode();
            }, 300);
        }

        // ================================================================
        // DELETE MESSAGE
        // ================================================================
        function deleteMessage(messageId) {
            const msg = messages.find(m => m.id === messageId);
            if (!msg) return;

            if (confirm('Apakah Anda yakin ingin menghapus pesan ini?')) {
                messages = messages.filter(m => m.id !== messageId);
                saveMessages();
                renderMessages();
                showToast('🗑️ Dihapus', 'Pesan berhasil dihapus', 'fa-trash');
                
                if (selectedMessageId === messageId) {
                    closeDetailModal();
                }
            }
        }

        // ================================================================
        // CLOSE DETAIL MODAL
        // ================================================================
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
            selectedMessageId = null;
            isEditing = false;
        }

        // ================================================================
        // MARK ALL AS READ
        // ================================================================
        function markAllAsRead() {
            if (!currentUser) return;

            let changed = false;
            messages.forEach(msg => {
                if (msg.to === currentUser.username && !msg.read) {
                    msg.read = true;
                    changed = true;
                }
            });

            if (changed) {
                saveMessages();
                renderMessages();
                showToast('✅ Berhasil', 'Semua pesan telah ditandai dibaca', 'fa-check-circle');
            } else {
                showToast('ℹ️ Info', 'Tidak ada pesan yang perlu ditandai', 'fa-info-circle');
            }
        }

        // ================================================================
        // COMPOSE MESSAGE
        // ================================================================
        function openComposeModal(toUser, toName, subject) {
            document.getElementById('composeModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            
            document.getElementById('composeSubject').value = subject || '';
            document.getElementById('composeMessage').value = '';
            document.getElementById('composeSendBtn').disabled = true;
            
            // Reset selected recipient
            selectedRecipient = null;
            document.getElementById('selectedUserContainer').innerHTML = '';
            document.getElementById('composeSearchInput').value = '';
            document.getElementById('userSuggestions').classList.remove('active');
            
            if (toUser) {
                const user = allUsers.find(u => u.username === toUser);
                if (user) {
                    selectRecipient(user);
                } else {
                    const userByName = allUsers.find(u => u.fullName === toName);
                    if (userByName) {
                        selectRecipient(userByName);
                    } else {
                        document.getElementById('composeSearchInput').value = toName || toUser;
                        // Cari dari localStorage
                        const fallbackUser = JSON.parse(localStorage.getItem('salink_users') || '[]').find(u => u.username === toUser);
                        if (fallbackUser) {
                            selectRecipient(fallbackUser);
                        }
                    }
                }
            }
            
            // Focus ke input pertama
            setTimeout(() => {
                if (!selectedRecipient) {
                    document.getElementById('composeSearchInput').focus();
                } else {
                    document.getElementById('composeSubject').focus();
                }
            }, 300);
        }

        function closeComposeModal() {
            document.getElementById('composeModal').classList.remove('active');
            document.body.style.overflow = '';
            selectedRecipient = null;
        }

        function searchUsers(query, users) {
            const currentUsername = currentUser?.username;
            
            return users.filter(u => {
                if (u.username === currentUsername) return false;
                const q = query.toLowerCase();
                return u.fullName.toLowerCase().includes(q) || 
                       u.username.toLowerCase().includes(q);
            });
        }

        function selectRecipient(user) {
            selectedRecipient = user;
            document.getElementById('composeSearchInput').value = '';
            document.getElementById('userSuggestions').classList.remove('active');
            
            const container = document.getElementById('selectedUserContainer');
            container.innerHTML = `
                <div class="selected-user">
                    <span>${user.fullName} (@${user.username})</span>
                    <span class="remove-user" onclick="removeSelectedRecipient()">
                        <i class="fas fa-times"></i>
                    </span>
                </div>
            `;
            
            validateCompose();
        }

        function removeSelectedRecipient() {
            selectedRecipient = null;
            document.getElementById('selectedUserContainer').innerHTML = '';
            document.getElementById('composeSearchInput').value = '';
            document.getElementById('composeSendBtn').disabled = true;
            document.getElementById('composeSearchInput').focus();
        }

        function validateCompose() {
            const subject = document.getElementById('composeSubject').value.trim();
            const message = document.getElementById('composeMessage').value.trim();
            const isValid = selectedRecipient !== null && subject !== '' && message !== '';
            document.getElementById('composeSendBtn').disabled = !isValid;
        }

        async function sendMessage() {
            if (!selectedRecipient || !currentUser) return;
            
            const subject = document.getElementById('composeSubject').value.trim();
            const message = document.getElementById('composeMessage').value.trim();
            
            if (!subject || !message) {
                showToast('⚠️ Error', 'Subjek dan pesan harus diisi', 'fa-exclamation-triangle');
                return;
            }
            
            const newMessage = {
                id: 'msg-' + (++messageIdCounter),
                from: currentUser.username,
                fromName: currentUser.fullName,
                fromGender: currentUser.gender,
                to: selectedRecipient.username,
                subject: subject,
                message: message,
                timestamp: Date.now(),
                read: false,
                isOwn: true
            };
            
            messages.push(newMessage);
            saveMessages();
            renderMessages();
            
            // 🔥 Kirim ke Spreadsheet via API
            try {
                await apiSendMessage(newMessage);
                showToast('✅ Berhasil', `Pesan terkirim ke ${selectedRecipient.fullName} (disimpan ke Spreadsheet)`, 'fa-paper-plane');
            } catch (error) {
                console.warn('⚠️ Gagal sync ke Spreadsheet:', error);
                showToast('✅ Berhasil', `Pesan terkirim ke ${selectedRecipient.fullName} (offline mode)`, 'fa-paper-plane');
            }
            
            closeComposeModal();
        }

        // ================================================================
        // COMPOSE EVENT LISTENERS
        // ================================================================
        function setupComposeListeners() {
            const searchInput = document.getElementById('composeSearchInput');
            const suggestions = document.getElementById('userSuggestions');
            
            searchInput.addEventListener('input', function() {
                const query = this.value.trim();
                if (query.length < 2) {
                    suggestions.classList.remove('active');
                    return;
                }
                
                // Filter users
                const results = searchUsers(query, allUsers);
                if (results.length === 0) {
                    suggestions.innerHTML = `
                        <div style="padding:8px 12px;color:var(--text-muted);font-size:0.7rem;">
                            <i class="fas fa-search"></i> Tidak ditemukan
                        </div>
                    `;
                    suggestions.classList.add('active');
                    return;
                }
                
                suggestions.innerHTML = results.map(user => `
                    <div class="suggestion-item" data-username="${user.username}">
                        <div class="suggestion-avatar">
                            ${user.gender === 'female' ? '<i class="fas fa-female"></i>' : '<i class="fas fa-male"></i>'}
                        </div>
                        <div>
                            <div class="suggestion-name">${user.fullName}</div>
                            <div class="suggestion-username">@${user.username}</div>
                        </div>
                    </div>
                `).join('');
                suggestions.classList.add('active');
                
                suggestions.querySelectorAll('.suggestion-item').forEach(el => {
                    el.addEventListener('click', function() {
                        const username = this.dataset.username;
                        const user = allUsers.find(u => u.username === username);
                        if (user) {
                            selectRecipient(user);
                        }
                    });
                });
            });
            
            searchInput.addEventListener('blur', function() {
                setTimeout(() => {
                    suggestions.classList.remove('active');
                }, 300);
            });
            
            searchInput.addEventListener('focus', function() {
                if (this.value.trim().length >= 2) {
                    suggestions.classList.add('active');
                }
            });
            
            document.getElementById('composeSubject').addEventListener('input', validateCompose);
            document.getElementById('composeMessage').addEventListener('input', validateCompose);
            
            document.getElementById('composeSendBtn').addEventListener('click', sendMessage);
            
            document.getElementById('composeModalClose').addEventListener('click', closeComposeModal);
            document.getElementById('composeModal').addEventListener('click', function(e) {
                if (e.target === this) closeComposeModal();
            });
            
            // Enter key untuk kirim (Ctrl+Enter)
            document.getElementById('composeMessage').addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    if (!document.getElementById('composeSendBtn').disabled) {
                        sendMessage();
                    }
                }
            });
        }

        // ================================================================
        // EVENT LISTENERS
        // ================================================================
        document.addEventListener('DOMContentLoaded', function() {
            loadTheme();
            
            // Load data async
            loadData().then(() => {
                setupComposeListeners();
            });

            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // Modal close
            document.getElementById('detailModalClose').addEventListener('click', closeDetailModal);
            document.getElementById('detailModal').addEventListener('click', function(e) {
                if (e.target === this) closeDetailModal();
            });

            // Mark all read
            document.getElementById('markAllReadBtn').addEventListener('click', markAllAsRead);

            // Sync button
            document.getElementById('syncBtn').addEventListener('click', syncMessages);

            // Compose button
            document.getElementById('composeBtn').addEventListener('click', function() {
                openComposeModal();
            });

            // ================================================================
            // EXPOSE FUNCTIONS GLOBAL
            // ================================================================
            window.openComposeModal = openComposeModal;
            window.openProfileUser = openProfileUser;
