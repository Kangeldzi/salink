<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SALINK - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: rgba(22, 27, 34, 0.92);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --border-color: #30363d;
            --accent-blue: #58a6ff;
            --accent-blue-gradient: linear-gradient(135deg, #58a6ff, #1f6feb);
            --shadow-color: rgba(0,0,0,0.4);
            --success: #3fb950;
            --danger: #f85149;
        }
        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e8edf2;
            --bg-card: rgba(255,255,255,0.92);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --border-color: #d0d7de;
            --accent-blue: #4facfe;
            --accent-blue-gradient: linear-gradient(135deg, #4facfe, #00c6fb);
            --shadow-color: rgba(0,0,0,0.08);
            --success: #2ea44f;
            --danger: #e31837;
        }
        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }
        .login-container {
            max-width: 420px;
            width: 100%;
            background: var(--bg-card);
            border-radius: 20px;
            padding: 32px 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px var(--shadow-color);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .login-header { text-align: center; margin-bottom: 28px; }
        .login-header .logo { font-size: 2.5rem; color: var(--accent-blue); margin-bottom: 8px; }
        .login-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        .login-header p { font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px; }
        
        .tab-buttons { display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg-secondary); border-radius: 12px; padding: 4px; }
        .tab-btn {
            flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer;
            font-size: 0.8rem; font-weight: 600; transition: all 0.3s;
            background: transparent; color: var(--text-secondary);
        }
        .tab-btn.active { background: var(--accent-blue-gradient); color: #fff; box-shadow: 0 4px 15px rgba(88,166,255,0.3); }
        .tab-btn:hover:not(.active) { background: var(--bg-input); color: var(--text-primary); }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { font-size: 0.7rem; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 4px; }
        .form-group .form-control {
            width: 100%; padding: 10px 14px; background: var(--bg-secondary);
            border: 2px solid var(--border-color); border-radius: 10px;
            color: var(--text-primary); font-size: 0.85rem; transition: all 0.3s;
        }
        .form-group .form-control:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 20px rgba(88,166,255,0.1); }
        .form-group .form-control:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .password-wrapper { position: relative; }
        .password-wrapper .form-control { padding-right: 44px; }
        .password-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-secondary); cursor: pointer;
            font-size: 1rem; transition: all 0.3s;
        }
        .password-toggle:hover { color: var(--text-primary); }
        
        .btn-login {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: var(--accent-blue-gradient); color: #fff;
            font-size: 0.9rem; font-weight: 600; cursor: pointer;
            transition: all 0.3s; margin-top: 8px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(88,166,255,0.4); }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .sync-status {
            display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 0.6rem; color: var(--text-secondary);
            margin-top: 16px; padding: 8px; border-radius: 8px;
            background: var(--bg-secondary); border: 1px solid var(--border-color);
        }
        .sync-status .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .sync-status .dot.online { background: var(--success); }
        .sync-status .dot.offline { background: var(--danger); }
        .sync-status .dot.syncing { background: #f0d080; animation: pulse 0.5s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .error-message {
            background: rgba(248,81,73,0.15); color: var(--danger);
            padding: 10px 14px; border-radius: 8px; font-size: 0.75rem;
            display: none; margin-bottom: 12px; border-left: 3px solid var(--danger);
        }
        .error-message.show { display: block; }
        
        .theme-toggle {
            position: fixed; top: 16px; right: 16px;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-primary); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; transition: all 0.3s; z-index: 100;
        }
        .theme-toggle:hover { border-color: var(--accent-blue); transform: scale(1.05); }
        
        .loading-spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid var(--border-color); border-top: 2px solid var(--accent-blue);
            border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .login-form, .register-form { display: none; }
        .login-form.active, .register-form.active { display: block; }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        @media (max-width: 480px) {
            .login-container { padding: 20px 16px; }
            .form-row { grid-template-columns: 1fr; }
            .login-header h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="login-container">
        <div class="login-header">
            <div class="logo">🛡️</div>
            <h1>SALINK</h1>
            <p>Sistem Peringatan Darurat Masyarakat</p>
        </div>

        <!-- Tabs -->
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="login">Masuk</button>
            <button class="tab-btn" data-tab="register">Daftar</button>
        </div>

        <!-- Error Message -->
        <div class="error-message" id="errorMessage"></div>

        <!-- ===== LOGIN FORM ===== -->
        <form class="login-form active" id="loginForm" autocomplete="off">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username atau Email</label>
                <input type="text" class="form-control" id="loginUsername" placeholder="Masukkan username atau email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Masukkan password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('loginPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>
        </form>

        <!-- ===== REGISTER FORM ===== -->
        <form class="register-form" id="registerForm" autocomplete="off">
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" class="form-control" id="regFullName" placeholder="Nama lengkap" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-user-tag"></i> Username</label>
                    <input type="text" class="form-control" id="regUsername" placeholder="Username unik" required>
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email</label>
                <input type="email" class="form-control" id="regEmail" placeholder="Email aktif" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> No WhatsApp</label>
                <input type="tel" class="form-control" id="regPhone" placeholder="08123456789" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-venus-mars"></i> Jenis Kelamin</label>
                    <select class="form-control" id="regGender">
                        <option value="male">Laki-laki</option>
                        <option value="female">Perempuan</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-globe"></i> Negara</label>
                    <input type="text" class="form-control" id="regCountry" value="Indonesia" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-map"></i> Provinsi</label>
                    <input type="text" class="form-control" id="regProvince" placeholder="Provinsi">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-city"></i> Kabupaten/Kota</label>
                    <input type="text" class="form-control" id="regCity" placeholder="Kabupaten/Kota">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-pin"></i> Alamat Lengkap</label>
                <input type="text" class="form-control" id="regAddress" placeholder="Alamat lengkap">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="password-wrapper">
                    <input type="password" class="form-control" id="regPassword" placeholder="Minimal 6 karakter" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('regPassword')">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn-login" id="registerBtn">
                <i class="fas fa-user-plus"></i> Daftar Sekarang
            </button>
        </form>

        <!-- Sync Status -->
        <div class="sync-status">
            <span class="dot online" id="syncDot"></span>
            <span id="syncText">Tersinkronisasi dengan Google Spreadsheets</span>
        </div>
    </div>

    <script>
        // ================================================================
        // KONFIGURASI
        // ================================================================
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzTGcN2FcOsC_rx01tUSvdw_trm2gKpJqUMyJSbYNonDYSqP5yn2ChYVc3ubWqaAyZC8A/exec';
        const DASHBOARD_URL = 'dashboard.html';

        // ================================================================
        // STATE
        // ================================================================
        let isSyncing = false;
        let currentTheme = 'dark';

        // ================================================================
        // THEME TOGGLE
        // ================================================================
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                html.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                localStorage.setItem('salink_theme', 'light');
            } else {
                currentTheme = 'dark';
                html.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('salink_theme', 'dark');
            }
        }

        function loadTheme() {
            const saved = localStorage.getItem('salink_theme');
            if (saved === 'light') {
                currentTheme = 'light';
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeIcon').className = 'fas fa-sun';
            }
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        loadTheme();

        // ================================================================
        // TOGGLE PASSWORD
        // ================================================================
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.parentElement.querySelector('.password-toggle i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ================================================================
        // TAB SWITCH
        // ================================================================
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tab = this.dataset.tab;
                document.querySelectorAll('.login-form, .register-form').forEach(f => f.classList.remove('active'));
                if (tab === 'login') {
                    document.getElementById('loginForm').classList.add('active');
                } else {
                    document.getElementById('registerForm').classList.add('active');
                }
                document.getElementById('errorMessage').classList.remove('show');
            });
        });

        // ================================================================
        // SHOW ERROR
        // ================================================================
        function showError(message) {
            const el = document.getElementById('errorMessage');
            el.textContent = message;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }

        // ================================================================
        // SYNC STATUS
        // ================================================================
        function updateSyncStatus(status, message) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (status === 'online') {
                dot.className = 'dot online';
                text.textContent = message || '✅ Tersinkronisasi dengan Google Spreadsheets';
            } else if (status === 'offline') {
                dot.className = 'dot offline';
                text.textContent = message || '⚠️ Offline - Data disimpan lokal';
            } else if (status === 'syncing') {
                dot.className = 'dot syncing';
                text.textContent = message || '🔄 Menyinkronkan data...';
            }
        }

        // ================================================================
        // GOOGLE SHEETS SYNC FUNCTIONS
        // ================================================================

        // === GET Data dari Google Sheets ===
        async function fetchUsersFromSheets() {
            try {
                updateSyncStatus('syncing', '🔄 Mengambil data pengguna...');
                const response = await fetch(GOOGLE_SCRIPT_URL + '?action=get_users&timestamp=' + Date.now());
                if (!response.ok) throw new Error('HTTP error: ' + response.status);
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    updateSyncStatus('online', '✅ Data pengguna dimuat');
                    return result.data;
                }
                throw new Error(result.message || 'Gagal mengambil data');
            } catch (error) {
                console.error('❌ Gagal fetch users:', error);
                updateSyncStatus('offline', '⚠️ Gagal mengambil data - menggunakan lokal');
                return null;
            }
        }

        // === SAVE User ke Google Sheets ===
        async function saveUserToSheets(userData, action = 'register') {
            try {
                isSyncing = true;
                updateSyncStatus('syncing', '🔄 Menyimpan data pengguna...');

                const response = await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: action,
                        user: userData,
                        timestamp: Date.now()
                    })
                });

                if (!response.ok) throw new Error('HTTP error: ' + response.status);
                const result = await response.json();

                if (result.status === 'success') {
                    updateSyncStatus('online', '✅ Data pengguna tersimpan');
                    isSyncing = false;
                    return true;
                }
                throw new Error(result.message || 'Gagal menyimpan');
            } catch (error) {
                console.error('❌ Gagal save user:', error);
                updateSyncStatus('offline', '⚠️ Gagal menyimpan - data disimpan lokal');
                // Simpan ke localStorage sebagai cadangan
                localStorage.setItem('salink_pending_user', JSON.stringify(userData));
                isSyncing = false;
                return false;
            }
        }

        // === Login dengan Google Sheets ===
        async function loginWithSheets(username, password) {
            try {
                updateSyncStatus('syncing', '🔄 Memverifikasi pengguna...');

                // 1. Coba ambil dari Google Sheets
                const users = await fetchUsersFromSheets();

                // 2. Jika gagal, ambil dari localStorage
                let allUsers = [];
                if (users && Array.isArray(users)) {
                    allUsers = users;
                    // Simpan ke localStorage untuk cache
                    localStorage.setItem('salink_users', JSON.stringify(users));
                } else {
                    // Ambil dari localStorage
                    const localUsers = localStorage.getItem('salink_users');
                    if (localUsers) {
                        try { allUsers = JSON.parse(localUsers); } catch (e) { allUsers = []; }
                    }
                }

                // 3. Cari user
                const user = allUsers.find(u =>
                    (u.username === username || u.email === username) &&
                    u.password === password
                );

                if (user) {
                    updateSyncStatus('online', '✅ Login berhasil!');
                    return user;
                } else {
                    showError('❌ Username atau password salah!');
                    updateSyncStatus('online', '❌ Login gagal');
                    return null;
                }
            } catch (error) {
                console.error('❌ Gagal login:', error);
                showError('❌ Gagal terhubung ke server. Periksa koneksi internet.');
                updateSyncStatus('offline', '⚠️ Gagal login - periksa koneksi');
                return null;
            }
        }

        // === Register dengan Google Sheets ===
        async function registerWithSheets(userData) {
            try {
                // 1. Cek apakah username sudah terdaftar
                const users = await fetchUsersFromSheets();
                let allUsers = [];
                if (users && Array.isArray(users)) {
                    allUsers = users;
                } else {
                    const localUsers = localStorage.getItem('salink_users');
                    if (localUsers) {
                        try { allUsers = JSON.parse(localUsers); } catch (e) { allUsers = []; }
                    }
                }

                // Cek duplicate
                if (allUsers.some(u => u.username === userData.username)) {
                    showError('❌ Username "' + userData.username + '" sudah terdaftar!');
                    return false;
                }
                if (allUsers.some(u => u.email === userData.email)) {
                    showError('❌ Email "' + userData.email + '" sudah terdaftar!');
                    return false;
                }

                // 2. Simpan ke Google Sheets
                const result = await saveUserToSheets(userData, 'register');

                if (result) {
                    // 3. Tambahkan ke localStorage
                    allUsers.push(userData);
                    localStorage.setItem('salink_users', JSON.stringify(allUsers));

                    // 4. Tampilkan pesan sukses
                    showError('✅ Pendaftaran berhasil! Silakan login.');
                    document.getElementById('errorMessage').className = 'error-message show';
                    document.getElementById('errorMessage').style.color = 'var(--success)';
                    document.getElementById('errorMessage').style.borderLeftColor = 'var(--success)';

                    // 5. Switch ke tab login
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelector('[data-tab="login"]').classList.add('active');
                    document.querySelectorAll('.login-form, .register-form').forEach(f => f.classList.remove('active'));
                    document.getElementById('loginForm').classList.add('active');

                    // Isi form login dengan username
                    document.getElementById('loginUsername').value = userData.username;

                    setTimeout(() => {
                        document.getElementById('errorMessage').classList.remove('show');
                    }, 5000);

                    return true;
                }
                return false;
            } catch (error) {
                console.error('❌ Gagal register:', error);
                showError('❌ Gagal mendaftar. Coba lagi.');
                return false;
            }
        }

        // ================================================================
        // HANDLE LOGIN
        // ================================================================
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showError('❌ Mohon isi username dan password!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Memproses...';

            const user = await loginWithSheets(username, password);

            if (user) {
                // Simpan user ke localStorage
                localStorage.setItem('salink_user', JSON.stringify(user));

                // Tambahkan timestamp login
                user.lastLogin = new Date().toISOString();

                // Update data di localStorage
                const users = JSON.parse(localStorage.getItem('salink_users') || '[]');
                const index = users.findIndex(u => u.username === user.username);
                if (index !== -1) {
                    users[index] = user;
                    localStorage.setItem('salink_users', JSON.stringify(users));
                }

                // Redirect ke dashboard
                window.location.href = DASHBOARD_URL + '?mode=full&user=' + encodeURIComponent(user.username);
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Masuk';
            }
        });

        // ================================================================
        // HANDLE REGISTER
        // ================================================================
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const fullName = document.getElementById('regFullName').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const gender = document.getElementById('regGender').value;
            const country = document.getElementById('regCountry').value.trim();
            const province = document.getElementById('regProvince').value.trim();
            const city = document.getElementById('regCity').value.trim();
            const address = document.getElementById('regAddress').value.trim();
            const password = document.getElementById('regPassword').value;
            const btn = document.getElementById('registerBtn');

            // Validasi
            if (!fullName || !username || !email || !phone || !password) {
                showError('❌ Mohon isi semua field wajib!');
                return;
            }
            if (password.length < 6) {
                showError('❌ Password minimal 6 karakter!');
                return;
            }
            if (!email.includes('@')) {
                showError('❌ Email tidak valid!');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Mendaftar...';

            const userData = {
                username: username,
                fullName: fullName,
                email: email,
                phone: phone,
                gender: gender,
                country: country || 'Indonesia',
                province: province || '',
                city: city || '',
                address: address || '',
                password: password,
                bio: 'Bergabung di SALINK untuk keamanan bersama',
                profilePicture: null,
                joinedDate: new Date().toLocaleString('id-ID', {
                    weekday: 'long',
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                }),
                lastLogin: null
            };

            const result = await registerWithSheets(userData);

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-user-plus"></i> Daftar Sekarang';

            if (result) {
                // Reset form
                document.getElementById('registerForm').reset();
                document.getElementById('regCountry').value = 'Indonesia';
            }
        });

        // ================================================================
        // ENTER KEY SUPPORT
        // ================================================================
        document.getElementById('loginPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('loginForm').dispatchEvent(new Event('submit'));
        });
        document.getElementById('regPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('registerForm').dispatchEvent(new Event('submit'));
        });

        // ================================================================
        // INITIALIZE - LOAD SAVED USERS
        // ================================================================
        async function initLogin() {
            // Ambil data dari Google Sheets saat pertama kali load
            const users = await fetchUsersFromSheets();
            if (users && Array.isArray(users)) {
                localStorage.setItem('salink_users', JSON.stringify(users));
                console.log('✅ ' + users.length + ' users loaded from Google Sheets');
            }

            // Cek apakah ada session sebelumnya
            const savedUser = localStorage.getItem('salink_user');
            if (savedUser) {
                try {
                    const user = JSON.parse(savedUser);
                    // Redirect ke dashboard jika masih login
                    // window.location.href = DASHBOARD_URL + '?mode=full&user=' + encodeURIComponent(user.username);
                } catch (e) {}
            }

            // Start auto sync
            setInterval(async () => {
                const users = await fetchUsersFromSheets();
                if (users && Array.isArray(users)) {
                    localStorage.setItem('salink_users', JSON.stringify(users));
                }
            }, 60000); // Sync setiap 1 menit

            console.log('✅ SALINK Login initialized');
        }

        // Run
        initLogin();

        // ================================================================
        // KEYBOARD SHORTCUT: Ctrl+Shift+S untuk sync manual
        // ================================================================
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.shiftKey && e.key === 'S') {
                e.preventDefault();
                fetchUsersFromSheets().then(users => {
                    if (users && Array.isArray(users)) {
                        localStorage.setItem('salink_users', JSON.stringify(users));
                        showError('✅ Data pengguna berhasil disinkronkan!');
                        document.getElementById('errorMessage').className = 'error-message show';
                        document.getElementById('errorMessage').style.color = 'var(--success)';
                        document.getElementById('errorMessage').style.borderLeftColor = 'var(--success)';
                        setTimeout(() => document.getElementById('errorMessage').classList.remove('show'), 3000);
                    }
                });
            }
        });
    </script>

</body>
</html>
