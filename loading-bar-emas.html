<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALINK - Redirect</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0d0805, #3d2314);
            color: #f5f0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
        }

        .loader-container {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: linear-gradient(135deg, #d4a849, #b8860b);
            box-shadow: 0 0 40px rgba(212, 168, 73, 0.4);
            animation: pulse 1.5s ease-in-out infinite;
        }

        .logo i {
            font-size: 2.5rem;
            color: #1a1008;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #d4a849, #f0d080, #f5f0e8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(245, 240, 232, 0.5);
            margin-bottom: 20px;
        }

        .loader {
            width: 50px;
            height: 50px;
            margin: 10px auto;
            border: 3px solid rgba(212, 168, 73, 0.1);
            border-top: 3px solid #d4a849;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .progress-bar {
            width: 250px;
            height: 3px;
            margin: 15px auto;
            background: rgba(212, 168, 73, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4a849, #f0d080);
            border-radius: 3px;
            animation: progress 1.2s ease-in-out forwards;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(212, 168, 73, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 168, 73, 0.6); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes progress {
            0% { width: 0%; }
            30% { width: 30%; }
            60% { width: 65%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }

        .loading-text {
            font-size: 0.7rem;
            color: rgba(245, 240, 232, 0.3);
            margin-top: 10px;
        }

        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }

        @media (max-width: 480px) {
            .logo {
                width: 60px;
                height: 60px;
            }
            .logo i {
                font-size: 1.8rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            .progress-bar {
                width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="logo">
            <i class="fas fa-bell"></i>
        </div>
        <h1>SALINK</h1>
        <p class="subtitle">Sistem Peringatan Darurat Masyarakat</p>
        
        <div class="loader"></div>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p class="loading-text">Mengarahkan ke dashboard <span class="loading-dots"></span></p>
    </div>

    <script>
        // Redirect ke dashboard.html dengan mode preview
        setTimeout(() => {
            window.location.href = 'dashboard.html?mode=preview';
        }, 1200);
    </script>
</body>
</html>
