<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SALINK - Profil Pengguna</title>
    
    <!-- ===== PWA META TAGS ===== -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1117" id="themeColorMeta">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SALINK">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ================================================================
           THEME VARIABLES - LIGHT & DARK MODE
           ================================================================ */
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: rgba(22, 27, 34, 0.92);
            --bg-input: rgba(22, 27, 34, 0.6);
            --text-primary: #e6edf3;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --border-color: #30363d;
            --border-light: rgba(255,255,255,0.06);
            --shadow-color: rgba(0,0,0,0.4);
            --shadow-light: rgba(0,0,0,0.2);
            --accent-blue: #58a6ff;
            --accent-blue-dark: #1f6feb;
            --accent-blue-gradient: linear-gradient(135deg, #58a6ff, #1f6feb);
            --accent-green: #25D366;
            --accent-red: #f85149;
            --accent-gold: #f0d080;
            --card-border: rgba(255,255,255,0.06);
            --toggle-bg: #30363d;
            --toggle-thumb: #58a6ff;
            --header-bg: rgba(22, 27, 34, 0.95);
            --footer-bg: rgba(13, 17, 23, 0.95);
            --modal-bg: rgba(22, 27, 34, 0.98);
            --input-border: #30363d;
            --input-focus: #58a6ff;
            --header-height: 60px;
            --footer-height: 65px;
            --danger: #f85149;
            --success: #3fb950;
        }

        [data-theme="light"] {
            --bg-primary: #f0f4f8;
            --bg-secondary: #e8edf2;
            --bg-card: rgba(255, 255, 255, 0.92);
            --bg-input: rgba(0,0,0,0.04);
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #6a6a8a;
            --border-color: #d0d7de;
            --border-light: rgba(0,0,0,0.06);
            --shadow-color: rgba(0,0,0,0.08);
            --shadow-light: rgba(0,0,0,0.04);
            --accent-blue: #4facfe;
            --accent-blue-dark: #00c6fb;
            --accent-blue-gradient: linear-gradient(135deg, #4facfe, #00c6fb);
            --accent-green: #25D366;
            --accent-red: #e31837;
            --accent-gold: #8d6b4b;
            --card-border: rgba(0,0,0,0.04);
            --toggle-bg: #d0d7de;
            --toggle-thumb: #4facfe;
            --header-bg: rgba(255, 255, 255, 0.95);
            --footer-bg: rgba(255, 255, 255, 0.95);
            --modal-bg: rgba(255, 255, 255, 0.98);
            --input-border: #dce1e8;
            --input-focus: #4facfe;
            --danger: #e31837;
            --success: #2ea44f;
        }

        /* ================================================================
           BASE STYLES
           ================================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 3px; }

        /* ================================================================
           ANIMATIONS
           ================================================================ */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes modalIn { from { transform: scale(0.8) translateY(30px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes zoomOut { 0% { transform: scale(1); } 40% { transform: scale(0.85); } 70% { transform: scale(0.95); } 100% { transform: scale(1); } }

        /* ================================================================
           TOGGLE SWITCH
           ================================================================ */
        .theme-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--toggle-bg);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }
        .theme-toggle.active { background: rgba(88, 166, 255, 0.3); }
        .theme-toggle .toggle-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--toggle-thumb);
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(88, 166, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
        }
        .theme-toggle.active .toggle-thumb { left: 22px; background: var(--toggle-thumb); }
        .theme-toggle .toggle-thumb i { color: #fff; }

        /* ================================================================
           HEADER - TANPA SEARCH & SIDEBAR
           ================================================================ */
        .app-bar {
            position: fixed;
            top: 0;
            width: 100%;
            height: var(--header-height);
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px;
            z-index: 1000;
            box-shadow: 0 2px 20px var(--shadow-color);
            border-bottom: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        .app-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1rem;
            cursor: pointer;
        }
        .app-title .bell-icon { font-size: 1.2rem; color: var(--accent-blue); }
        .app-title span { font-size: 1rem; }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.3s;
            text-decoration: none;
        }
        .back-btn:hover { border-color: var(--accent-blue); transform: scale(1.05); }
        .back-btn:active { transform: scale(0.95); }
        .back-btn i { font-size: 1rem; }

        /* ================================================================
           MAIN CONTENT
           ================================================================ */
        .main-content {
            padding: calc(var(--header-height) + 14px) 14px calc(var(--footer-height) + 14px);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            min-height: 100vh;
        }

        /* ================================================================
           PROFILE HEADER
           ================================================================ */
        .profile-header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }
        .profile-avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            border: 3px solid var(--accent-blue);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-blue-gradient);
            font-size: 2.5rem;
            color: #fff;
            cursor: default;
            transition: all 0.3s;
        }
        .profile-avatar-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            cursor: default;
        }
        .profile-username {
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: default;
        }
        .profile-bio {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 6px;
            cursor: default;
        }

        /* ================================================================
           PROFILE STATS
           ================================================================ */
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 16px 0 10px;
            background: var(--bg-card);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: background 0.3s ease;
        }
        .profile-stat-item {
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            padding: 4px;
            border-radius: 8px;
        }
        .profile-stat-item:hover {
            background: var(--bg-input);
            transform: scale(1.02);
        }
        .profile-stat-item:active {
            animation: zoomOut 0.3s ease;
        }
        .profile-stat-number {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-blue);
            display: block;
        }
        .profile-stat-label {
            font-size: 0.55rem;
            color: var(--text-muted);
        }

        /* ================================================================
           PROFILE ACTIONS - PESAN & INVITE
           ================================================================ */
        .profile-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin: 5px 0 12px;
            flex-wrap: wrap;
        }
        .profile-pesan-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-blue-gradient);
            color: #fff;
            border: none;
            padding: 8px 24px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3);
            transition: all 0.3s;
            text-decoration: none;
        }
        .profile-pesan-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 166, 255, 0.4);
        }
        .profile-pesan-btn:active {
            animation: zoomOut 0.3s ease;
        }
        .profile-invite-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--bg-input);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        .profile-invite-btn:hover {
            background: var(--bg-card);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.1);
        }
        .profile-invite-btn:active {
            animation: zoomOut 0.3s ease;
        }

        /* ================================================================
           PROFILE NAVBAR - FOTO & TEMAN
           ================================================================ */
        .profile-nav-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .profile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 6px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            color: var(--text-muted);
            background: var(--bg-input);
            border: 1px solid transparent;
            font-size: 0.6rem;
            gap: 4px;
        }
        .profile-nav-item:hover {
            background: var(--bg-card);
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            transform: translateY(-2px);
        }
        .profile-nav-item:active {
            animation: zoomOut 0.3s ease;
        }
        .profile-nav-item span:first-child {
            font-size: 1.4rem;
        }
        .profile-nav-item span:last-child {
            font-size: 0.6rem;
        }

        /* ================================================================
           POST SECTION - READ ONLY
           ================================================================ */
        .post-section {
            margin-top: 16px;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 15px var(--shadow-light);
            max-height: 500px;
            overflow-y: auto;
            transition: background 0.3s ease;
        }
        .post-section::-webkit-scrollbar { width: 3px; }
        .post-section::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .post-section::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 3px; }

        .section-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title-small i {
            color: var(--accent-blue);
        }

        /* ===== POST ITEM ===== */
        .post {
            background: var(--bg-input);
            border-radius: 10px;
            padding: 14px;
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            position: relative;
            transition: background 0.3s ease;
        }
        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
        }
        .post-profile-pic {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent-blue-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid var(--accent-blue);
            cursor: pointer;
            transition: all 0.3s;
        }
        .post-profile-pic:hover {
            transform: scale(1.05);
        }
        .post-profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .post-profile-pic i {
            color: #fff;
            font-size: 0.85rem;
        }
        .post-user-info h4 {
            font-size: 0.85rem;
            color: var(--text-primary);
        }
        .post-user-info h4 .profile-link {
            color: var(--accent-blue);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        .post-user-info h4 .profile-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .post-user-info small {
            font-size: 0.55rem;
            color: var(--text-muted);
        }

        .post-content {
            margin: 8px 0;
        }
        .post-text {
            font-size: 0.75rem;
            line-height: 1.5;
            color: var(--text-primary);
        }
        .post-media {
            margin: 8px 0;
        }
        .post-media img,
        .post-media video {
            max-width: 100%;
            max-height: 220px;
            border-radius: 8px;
        }

        .post-actions {
            display: flex;
            gap: 12px;
            padding: 6px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 8px;
            flex-wrap: wrap;
        }
        .post-action {
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.65rem;
            transition: all 0.3s;
            padding: 3px 6px;
            border-radius: 6px;
        }
        .post-action:hover {
            color: var(--accent-blue);
            background: var(--bg-input);
        }
        .post-action i {
            font-size: 0.8rem;
        }
        .post-action.liked {
            color: var(--accent-red);
        }
        .post-action.liked i {
            color: var(--accent-red);
        }
        .post-action .like-count {
            font-size: 0.6rem;
            font-weight: 600;
        }

        .comments-section {
            max-height: 200px;
            overflow-y: auto;
            margin-bottom: 8px;
        }
        .comment {
            display: flex;
            flex-direction: column;
            margin-bottom: 8px;
            padding: 6px 8px;
            background: var(--bg-input);
            border-radius: 8px;
            transition: background 0.3s ease;
        }
        .comment-main {
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .comment-profile-pic {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--accent-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-blue-gradient);
            cursor: pointer;
            transition: all 0.3s;
        }
        .comment-profile-pic:hover {
            transform: scale(1.05);
        }
        .comment-profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .comment-profile-pic i {
            font-size: 0.65rem;
            color: #fff;
        }
        .comment-content {
            flex: 1;
        }
        .comment-user {
            font-weight: 600;
            font-size: 0.65rem;
            color: var(--accent-blue);
            cursor: pointer;
            transition: all 0.3s;
        }
        .comment-user:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .comment-text {
            font-size: 0.7rem;
            color: var(--text-primary);
            margin: 2px 0;
        }
        .comment-time {
            font-size: 0.5rem;
            color: var(--text-muted);
        }
        .comment-actions {
            display: flex;
            gap: 10px;
            margin-top: 4px;
        }
        .comment-action {
            font-size: 0.55rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s;
        }
        .comment-action:hover {
            color: var(--accent-blue);
        }
        .comment-replies {
            margin-left: 34px;
            margin-top: 6px;
            border-left: 2px solid var(--border-color);
            padding-left: 10px;
        }
        .reply-comment {
            margin-bottom: 6px;
            padding: 4px 6px;
            background: var(--bg-input);
            border-radius: 6px;
        }
        .reply-comment .comment-main {
            display: flex;
            align-items: flex-start;
            gap: 6px;
        }
        .reply-comment .comment-profile-pic {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .reply-comment .comment-profile-pic:hover {
            transform: scale(1.05);
        }
        .reply-comment .comment-user {
            font-size: 0.6rem;
            cursor: pointer;
        }
        .reply-comment .comment-user:hover {
            text-decoration: underline;
            opacity: 0.8;
        }
        .reply-comment .comment-text {
            font-size: 0.65rem;
        }
        .reply-comment .comment-time {
            font-size: 0.45rem;
        }

        .add-comment {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-top: 6px;
        }
        .comment-input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--input-border);
            border-radius: 18px;
            padding: 6px 12px;
            color: var(--text-primary);
            font-size: 0.65rem;
            transition: all 0.3s;
            min-height: 32px;
        }
        .comment-input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }
        .comment-input::placeholder {
            color: var(--text-muted);
        }
        .send-comment {
            background: var(--accent-blue-gradient);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .send-comment:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(88, 166, 255, 0.3);
        }
        .send-comment:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ================================================================
           EMPTY STATE
           ================================================================ */
        .empty-state {
            text-align: center;
            padding: 30px 0;
            color: var(--text-muted);
        }
        .empty-state i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 0.75rem;
        }

        /* ================================================================
           FOTO MODAL
           ================================================================ */
        #fotoGrid::-webkit-scrollbar { width: 3px; }
        #fotoGrid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        #fotoGrid::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 3px; }

        .foto-item {
            background: var(--bg-input);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            position: relative;
        }
        .foto-item:hover { border-color: var(--accent-blue); transform: translateY(-2px); }
        .foto-item .foto-media { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; cursor: pointer; }
        .foto-item .foto-media.video { aspect-ratio: 16/9; }
        .foto-item .foto-info {
            padding: 6px 8px;
            font-size: 0.55rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .foto-item .foto-info .foto-user {
            color: var(--accent-blue);
            cursor: pointer;
            font-weight: 500;
        }
        .foto-item .foto-info .foto-user:hover { text-decoration: underline; }
        .foto-item .foto-actions {
            display: flex;
            gap: 8px;
            padding: 4px 8px 8px;
            border-top: 1px solid var(--border-color);
        }
        .foto-item .foto-actions .foto-action {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.55rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.3s;
        }
        .foto-item .foto-actions .foto-action:hover { background: var(--bg-input); color: var(--accent-blue); }
        .foto-item .foto-actions .foto-action.liked { color: var(--accent-red); }
        .foto-item .foto-actions .foto-action.liked i { color: var(--accent-red); }

        .foto-item .foto-actions .foto-action.delete-foto:hover { opacity: 0.7; }

        .foto-comment-section {
            padding: 4px 8px 8px;
            border-top: 1px solid var(--border-color);
        }
        .foto-comment-section .foto-comment {
            font-size: 0.55rem;
            color: var(--text-secondary);
            padding: 2px 0;
        }
        .foto-comment-section .foto-comment .foto-cmt-user {
            color: var(--accent-blue);
            cursor: pointer;
            font-weight: 500;
        }
        .foto-comment-section .foto-comment .foto-cmt-user:hover { text-decoration: underline; }
        .foto-comment-section .foto-add-comment {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }
        .foto-comment-section .foto-add-comment input {
            flex: 1;
            background: var(--bg-input);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 4px 10px;
            color: var(--text-primary);
            font-size: 0.6rem;
            min-height: 28px;
        }
        .foto-comment-section .foto-add-comment input:focus { outline: none; border-color: var(--accent-blue); }
        .foto-comment-section .foto-add-comment button {
            background: var(--accent-blue-gradient);
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: #fff;
            cursor: pointer;
            font-size: 0.6rem;
            flex-shrink: 0;
            transition: all 0.3s;
        }
        .foto-comment-section .foto-add-comment button:hover { transform: scale(1.05); }
        .foto-comment-section .foto-add-comment button:disabled { opacity: 0.5; cursor: not-allowed; }

        .filter-foto-btn.active {
            background: var(--accent-blue-gradient) !important;
            color: #fff !important;
            border-color: var(--accent-blue) !important;
        }

        /* ================================================================
           MODALS
           ================================================================ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        .modal-content {
            background: var(--modal-bg);
            border-radius: 20px;
            max-width: 500px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            padding: 20px 18px;
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px var(--shadow-color);
            animation: modalIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 auto;
            transition: background 0.3s ease;
        }
        .modal-content::-webkit-scrollbar { width: 3px; }
        .modal-content::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .modal-content::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 3px; }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            position: sticky;
            top: 0;
            background: var(--modal-bg);
            z-index: 2;
            border-radius: 18px 18px 0 0;
        }
        .modal-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .modal-title .badge-count {
            background: var(--bg-input);
            color: var(--text-primary);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
        }
        .modal-close {
            background: var(--bg-input);
            border: none;
            color: var(--text-primary);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            border: 1px solid var(--border-color);
        }
        .modal-close:hover {
            background: var(--bg-card);
            transform: rotate(90deg);
        }

        .modal-body {
            color: var(--text-primary);
            font-size: 0.75rem;
            flex: 1;
            padding: 0 2px;
        }

        .modal-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
            position: sticky;
            bottom: 0;
            background: var(--modal-bg);
            z-index: 2;
            border-radius: 0 0 18px 18px;
            padding-bottom: 4px;
        }
        .modal-footer .btn-close-modal {
            background: var(--bg-input);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            padding: 8px 30px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        .modal-footer .btn-close-modal:hover {
            background: var(--bg-card);
            border-color: var(--accent-blue);
        }

        /* ===== FRIEND ITEM ===== */
        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 10px;
            background: var(--bg-input);
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            cursor: pointer;
        }
        .friend-item:hover {
            background: var(--bg-card);
            border-color: var(--accent-blue);
        }
        .friend-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent-blue-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1.2rem;
            flex-shrink: 0;
            overflow: hidden;
            cursor: pointer;
        }
        .friend-avatar:hover {
            transform: scale(1.05);
        }
        .friend-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .friend-info {
            flex: 1;
        }
        .friend-name {
            font-size: 0.8rem;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        .friend-name:hover {
            color: var(--accent-blue);
        }
        .friend-status {
            font-size: 0.6rem;
            color: var(--text-muted);
        }

        /* ===== BIODATA ===== */
        .bio-data-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 4px 0;
        }
        .bio-data-item {
            background: var(--bg-input);
            border-radius: 8px;
            padding: 8px 10px;
            border: 1px solid var(--border-color);
        }
        .bio-data-item .bio-label {
            font-size: 0.55rem;
            color: var(--text-muted);
            display: block;
        }
        .bio-data-item .bio-value {
            font-size: 0.75rem;
            color: var(--accent-blue);
            font-weight: 500;
            margin-top: 2px;
            word-break: break-word;
        }

        /* ================================================================
           TOAST
           ================================================================ */
        .toast-container {
            position: fixed;
            bottom: calc(var(--footer-height) + 20px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            max-width: 400px;
            width: 90%;
        }
        .toast {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 10px 30px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 12px;
            animation: fadeIn 0.4s ease;
            margin-bottom: 8px;
            transition: background 0.3s ease;
        }
        .toast .toast-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent-blue);
        }
        .toast .toast-content {
            flex: 1;
        }
        .toast .toast-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        .toast .toast-message {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .toast .toast-close {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            padding: 4px;
            transition: all 0.3s;
        }
        .toast .toast-close:hover {
            color: var(--text-primary);
        }

        /* ================================================================
           RESPONSIVE
           ================================================================ */
        @media (max-width: 480px) {
            .main-content {
                padding: calc(var(--header-height) + 10px) 10px calc(var(--footer-height) + 10px);
            }
            .profile-avatar-large {
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
            .profile-name {
                font-size: 1rem;
            }
            .profile-stats {
                gap: 6px;
                padding: 10px;
            }
            .profile-stat-number {
                font-size: 0.9rem;
            }
            .profile-stat-label {
                font-size: 0.5rem;
            }
            .profile-nav-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 6px;
            }
            .profile-nav-item {
                padding: 10px 4px;
            }
            .profile-nav-item span:first-child {
                font-size: 1.2rem;
            }
            .profile-nav-item span:last-child {
                font-size: 0.55rem;
            }
            .modal-content {
                padding: 16px 14px;
                max-height: 90vh;
            }
            .modal-title {
                font-size: 0.9rem;
            }
            .bio-data-content {
                grid-template-columns: 1fr;
            }
            .post-actions {
                gap: 8px;
            }
            .post-action {
                font-size: 0.6rem;
                padding: 2px 4px;
            }
            .comment-main {
                gap: 6px;
            }
            .comment-profile-pic {
                width: 22px;
                height: 22px;
            }
            .profile-pesan-btn,
            .profile-invite-btn {
                font-size: 0.65rem;
                padding: 6px 16px;
            }
            .profile-actions {
                gap: 6px;
            }
            .back-btn {
                width: 32px;
                height: 32px;
            }
            .back-btn i {
                font-size: 0.85rem;
            }
            .theme-toggle {
                width: 40px;
                height: 22px;
            }
            .theme-toggle .toggle-thumb {
                width: 16px;
                height: 16px;
                font-size: 0.5rem;
            }
            .theme-toggle.active .toggle-thumb {
                left: 20px;
            }
            #fotoGrid {
                grid-template-columns: repeat(auto-fill, minmax(120px,1fr));
                gap: 6px;
            }
        }

        @media (max-width: 380px) {
            .profile-stats {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 4px;
            }
            .profile-stat-number {
                font-size: 0.8rem;
            }
            .profile-stat-label {
                font-size: 0.45rem;
            }
            .profile-nav-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .theme-toggle {
                width: 36px;
                height: 20px;
            }
            .theme-toggle .toggle-thumb {
                width: 14px;
                height: 14px;
                font-size: 0.45rem;
            }
            .theme-toggle.active .toggle-thumb {
                left: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ================================================================ -->

    <!-- ================================================================ -->
    <!-- JAVASCRIPT
    <!-- ================================================================ -->
    <script>
        // ================================================================
        // STATE
        // ================================================================
        let currentUser = null;
        let profileUser = null;
        let posts = [];
        let postIdCounter = 0;
        let friends = [];
        let friendIdCounter = 0;
        let currentTheme = 'dark';
        let toastTimeout = null;
        let currentFotoFilter = 'semua';
        let notifications = [];
        let notificationIdCounter = 0;

        // ================================================================
        // LOAD THEME
        // ================================================================
        function loadTheme() {
            const savedTheme = localStorage.getItem('salink_theme');
            if (savedTheme === 'light') {
                currentTheme = 'light';
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeToggle').classList.add('active');
                document.getElementById('toggleIcon').className = 'fas fa-sun';
                const metaThemeColor = document.getElementById('themeColorMeta');
                if (metaThemeColor) metaThemeColor.content = '#f0f4f8';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            const toggleThumb = document.getElementById('toggleThumb');
            const toggleIcon = document.getElementById('toggleIcon');
            const metaThemeColor = document.getElementById('themeColorMeta');
            
            if (currentTheme === 'dark') {
                currentTheme = 'light';
                html.setAttribute('data-theme', 'light');
                themeToggle.classList.add('active');
                toggleIcon.className = 'fas fa-sun';
                if (metaThemeColor) metaThemeColor.content = '#f0f4f8';
                localStorage.setItem('salink_theme', 'light');
            } else {
                currentTheme = 'dark';
                html.removeAttribute('data-theme');
                themeToggle.classList.remove('active');
                toggleIcon.className = 'fas fa-moon';
                if (metaThemeColor) metaThemeColor.content = '#0d1117';
                localStorage.setItem('salink_theme', 'dark');
            }
        }

        // ================================================================
        // TOAST SYSTEM
        // ================================================================
        function showToast(title, message, icon = 'fa-info-circle') {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            clearTimeout(toastTimeout);
            
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <div class="toast-icon"><i class="fas ${icon}"></i></div>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    <div class="toast-message">${message}</div>
                </div>
                <button class="toast-close"><i class="fas fa-times"></i></button>
            `;
            
            toast.querySelector('.toast-close').addEventListener('click', () => {
                toast.remove();
            });
            
            container.appendChild(toast);
            
            toastTimeout = setTimeout(() => {
                toast.remove();
            }, 5000);
        }

            if (!username) return null;
            
            const users = JSON.parse(localStorage.getItem('salink_users') || '[]');
            let user = users.find(u => u.username === username);
            
            if (!user) {
                const savedUser = localStorage.getItem('salink_user');
                if (savedUser) {

                    village: '',

                        year: 'numeric',

                    const parsed = JSON.parse(saved);
                    if (Array.isArray(parsed) && parsed.length > 0) {
                        posts = parsed;
                        let maxId = 0;
                        posts.forEach(p => {

                        });
                        postIdCounter = maxId;
                        return true;

            } catch (e) {

            return false;

            ];
            
            notifTypes.forEach((nt, index) => {

                notifications.push({

                    sender: nt.sender,

            saveNotifications();
            updateNotifBadge();

        // ================================================================
        // GET TIME AGO
        // ================================================================
        function getTimeAgo(timestamp) {
            const diff = Date.now() - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);
            const weeks = Math.floor(days / 7);
            const months = Math.floor(days / 30);
            const years = Math.floor(days / 365);
            
            if (seconds < 60) return 'Baru saja';
            if (minutes < 60) return `${minutes} menit yang lalu`;
            if (minutes < 120) return '1 jam yang lalu';
            if (hours < 24) return `${hours} jam yang lalu`;
            if (days < 7) return `${days} hari yang lalu`;
            if (weeks < 4) return `${weeks} minggu yang lalu`;
            if (months < 12) return `${months} bulan yang lalu`;
            return `${years} tahun yang lalu`;
        }

                                <div style="font-size:0.65rem;color:var(--accent-blue);">

                                </div>
                                <div style="font-size:0.6rem;color:var(--text-secondary);">

        // ================================================================
        // ATTACH POST LISTENERS
        // ================================================================
        function attachPostListeners() {
            // LIKE
            document.querySelectorAll('.post-action.liked, .post-action[data-post-id]').forEach(el => {
                el.addEventListener('click', function(e) {
                    const postId = this.dataset.postId;
                    if (!postId) return;
                    
                    if (!currentUser) {
                        showToast('🔒 Login Diperlukan', 'Silakan masuk untuk menyukai postingan', 'fa-lock');
                        return;
                    }
                    
                    const post = posts.find(p => p.id === postId);
                    if (!post) return;
                    
                    const index = post.likes.indexOf(currentUser.username);
                    if (index > -1) {
                        post.likes.splice(index, 1);
                    } else {
                        post.likes.push(currentUser.username);
                    }
                    savePosts();
                    renderProfilePosts(posts.filter(p => p.userId === profileUser.username));
                });
            });
            
            // COMMENT TOGGLE
            document.querySelectorAll('.comment-toggle').forEach(el => {
                el.addEventListener('click', function() {
                    const postId = this.dataset.postId;
                    const commentsSection = document.getElementById(`comments-${postId}`);
                    if (commentsSection) {
                        commentsSection.style.display = commentsSection.style.display === 'none' ? 'block' : 'none';
                    }
                });
            });
            
            // SEND COMMENT
            document.querySelectorAll('.send-comment').forEach(el => {
                el.addEventListener('click', function() {
                    if (!currentUser) {
                        showToast('🔒 Login Diperlukan', 'Silakan masuk untuk berkomentar', 'fa-lock');
                        return;
                    }
                    
                    const postId = this.dataset.postId;
                    const input = this.parentElement.querySelector('.comment-input');
                    const text = input.value.trim();
                    if (!text) return;
                    
                    const post = posts.find(p => p.id === postId);
                    if (!post) return;
                    
                    if (!post.comments) post.comments = [];
                    const comment = {
                        id: 'cmt-' + Date.now(),
                        userId: currentUser.username,
                        userFullName: currentUser.fullName,
                        userGender: currentUser.gender,
                        userProfilePic: currentUser.profilePicture || null,
                        text: text,
                        timestamp: Date.now(),
                        replies: []
                    };
                    post.comments.push(comment);
                    savePosts();
                    renderProfilePosts(posts.filter(p => p.userId === profileUser.username));
                    input.value = '';
                    showToast('✅ Berhasil', 'Komentar ditambahkan!', 'fa-check-circle');
                });
            });
            
            // COMMENT INPUT ENTER
            document.querySelectorAll('.comment-input').forEach(el => {
                el.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const sendBtn = this.parentElement.querySelector('.send-comment');
                        if (sendBtn) sendBtn.click();
                    }
                });
            });
            
            // REPLY COMMENT
            document.querySelectorAll('.reply-comment-action').forEach(el => {
                el.addEventListener('click', function() {
                    if (!currentUser) {
                        showToast('🔒 Login Diperlukan', 'Silakan masuk untuk membalas komentar', 'fa-lock');
                        return;
                    }
                    
                    const postId = this.dataset.postId;
                    const commentId = this.dataset.commentId;
                    const replyText = prompt('Balas komentar:');
                    if (!replyText) return;
                    
                    const post = posts.find(p => p.id === postId);
                    if (!post) return;
                    const comment = post.comments.find(c => c.id === commentId);
                    if (!comment) return;
                    
                    if (!comment.replies) comment.replies = [];
                    const reply = {
                        id: 'reply-' + Date.now(),
                        userId: currentUser.username,
                        userFullName: currentUser.fullName,
                        userGender: currentUser.gender,
                        userProfilePic: currentUser.profilePicture || null,
                        text: replyText,
                        timestamp: Date.now()
                    };
                    comment.replies.push(reply);
                    savePosts();
                    renderProfilePosts(posts.filter(p => p.userId === profileUser.username));
                    showToast('✅ Berhasil', 'Balasan ditambahkan!', 'fa-check-circle');
                });
            });
            
            // SHARE
            document.querySelectorAll('.post-action.share').forEach(el => {
                el.addEventListener('click', function() {
                    const postId = this.dataset.postId;
                    const post = posts.find(p => p.id === postId);
                    if (!post) return;
                    const text = post.text || 'Postingan SALINK';
                    const url = window.location.href;
                    if (navigator.share) {
                        navigator.share({
                            title: 'Postingan SALINK',
                            text: text,
                            url: url
                        }).catch(() => {});
                    } else {
                        navigator.clipboard.writeText(`${text}\n${url}`).then(() => {
                            showToast('📋 Disalin', 'Link postingan disalin ke clipboard', 'fa-copy');
                        }).catch(() => {
                            showToast('📋 Disalin', 'Link: ' + url, 'fa-copy');
                        });
                    }
                });
            });
        }

        function renderFotoPosts(filter) {
            const grid = document.getElementById('fotoGrid');
            grid.innerHTML = '';
            
            // Ambil semua postingan dari profileUser (bukan currentUser)
            const userPosts = posts.filter(p => p.userId === profileUser?.username && (p.mediaType === 'image' || p.mediaType === 'video'));
            
            let filteredPosts = userPosts;
            if (filter === 'foto') {
                filteredPosts = userPosts.filter(p => p.mediaType === 'image');
            } else if (filter === 'video') {
                filteredPosts = userPosts.filter(p => p.mediaType === 'video');
            }
            
            document.getElementById('fotoModalCount').textContent = filteredPosts.length;
            document.getElementById('fotoTotalCount').textContent = `Total: ${filteredPosts.length}`;
            
            if (filteredPosts.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1;text-align:center;padding:40px 0;color:var(--text-muted);">
                        <i class="fas fa-images" style="font-size:3rem;display:block;margin-bottom:10px;opacity:0.3;"></i>
                        <p>${profileUser?.fullName || 'Pengguna'} belum memiliki ${filter === 'foto' ? 'foto' : filter === 'video' ? 'video' : 'foto/video'}</p>
                    </div>
                `;
                return;
            }
            
            filteredPosts.sort((a, b) => b.timestamp - a.timestamp).forEach(post => {
                const item = document.createElement('div');
                item.className = 'foto-item';
                
                const isLiked = currentUser && post.likes && post.likes.includes(currentUser.username);
                const isOwner = currentUser && post.userId === currentUser.username;
                const mediaClass = post.mediaType === 'video' ? 'video' : '';
                
                let mediaHtml = '';
                if (post.mediaType === 'image') {
                    mediaHtml = `<img src="${post.mediaData}" alt="Foto" class="foto-media" onclick="openImagePreview('${post.mediaData}')">`;
                } else if (post.mediaType === 'video') {
                    mediaHtml = `<video controls class="foto-media video" onclick="this.paused ? this.play() : this.pause()"><source src="${post.mediaData}"></video>`;
                }
                
                const recentComments = post.comments ? post.comments.slice(-2) : [];
                
                item.innerHTML = `
                    ${mediaHtml}
                    <div class="foto-info">
                        <span class="foto-user" onclick="openProfileUser('${post.userId}')">${post.userFullName}</span>
                        <span style="font-size:0.5rem;color:var(--text-muted);">${getTimeAgo(post.timestamp)}</span>
                    </div>
                    <div class="foto-actions">
                        <div class="foto-action ${isLiked ? 'liked' : ''}" data-post-id="${post.id}">
                            <i class="${isLiked ? 'fas' : 'far'} fa-heart"></i>
                            <span>${post.likes && post.likes.length > 0 ? post.likes.length : '0'}</span>
                        </div>
                        <div class="foto-action" onclick="toggleFotoComments('${post.id}')">
                            <i class="far fa-comment"></i>
                            <span>${post.comments ? post.comments.length : '0'}</span>
                        </div>
                        ${isOwner ? `
                            <div class="foto-action delete-foto" data-post-id="${post.id}">
                                <i class="fas fa-trash"></i>
                                <span>Hapus</span>
                            </div>
                        ` : ''}
                    </div>
                    <div class="foto-comment-section" id="foto-comments-${post.id}" style="display:none;">
                        ${recentComments.map(c => `
                            <div class="foto-comment">
                                <span class="foto-cmt-user" onclick="openProfileUser('${c.userId}')">${c.userFullName}</span>
                                : ${c.text}
                            </div>
                        `).join('')}
                        ${post.comments && post.comments.length > 2 ? `<div style="font-size:0.5rem;color:var(--text-muted);padding:2px 0;">+${post.comments.length - 2} komentar lainnya</div>` : ''}
                        <div class="foto-add-comment">
                            <input type="text" placeholder="Tulis komentar..." data-post-id="${post.id}">
                            <button data-post-id="${post.id}"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                `;
                
                grid.appendChild(item);
            });
            
            attachFotoListeners();
        }

        function toggleFotoComments(postId) {
            const section = document.getElementById(`foto-comments-${postId}`);
            if (section) {
                section.style.display = section.style.display === 'none' ? 'block' : 'none';
            }
        }

        function attachFotoListeners() {
            // LIKE di foto modal
            document.querySelectorAll('.foto-action.liked, .foto-action[data-post-id]').forEach(el => {
                el.addEventListener('click', function(e) {
                    const postId = this.dataset.postId;
                    if (!postId) return;
                    
                    if (!currentUser) {
                        showToast('🔒 Login Diperlukan', 'Silakan masuk untuk menyukai', 'fa-lock');
                        return;
                    }
                    
                    const post = posts.find(p => p.id === postId);
                    if (!post) return;
                    
                    const index = post.likes.indexOf(currentUser.username);
                    if (index > -1) {
                        post.likes.splice(index, 1);
                    } else {
                        post.likes.push(currentUser.username);
                    }
                    savePosts();
                    renderFotoPosts(currentFotoFilter);
                });
            });
            
            // HAPUS di foto modal
            document.querySelectorAll('.delete-foto').forEach(el => {
                el.addEventListener('click', function(e) {
                    const postId = this.dataset.postId;
                    if (!postId) return;
                    
                    if (!currentUser) {
                        showToast('🔒 Login Diperlukan', 'Silakan masuk untuk menghapus', 'fa-lock');
                        return;
                    }
                    
                    if (!confirm('Apakah Anda yakin ingin menghapus postingan ini?')) return;
                    
                    posts = posts.filter(p => p.id !== postId);
                    savePosts();
                    renderFotoPosts(currentFotoFilter);
                    renderProfilePosts(posts.filter(p => p.userId === profileUser.username));
                    showToast('🗑️ Dihapus', 'Postingan berhasil dihapus', 'fa-trash');
                });
            });
            
            // KOMENTAR di foto modal
            document.querySelectorAll('.foto-add-comment button').forEach(el => {
                el.addEventListener('click', function() {
                    if (!currentUser) {
                        showToast('🔒 Login Diperlukan', 'Silakan masuk untuk berkomentar', 'fa-lock');
                        return;
                    }
                    
                    const postId = this.dataset.postId;
                    const input = this.parentElement.querySelector('input');
                    const text = input.value.trim();
                    if (!text) return;
                    
                    const post = posts.find(p => p.id === postId);
                    if (!post) return;
                    
                    if (!post.comments) post.comments = [];
                    const comment = {
                        id: 'cmt-' + Date.now(),
                        userId: currentUser.username,
                        userFullName: currentUser.fullName,
                        userGender: currentUser.gender,
                        userProfilePic: currentUser.profilePicture || null,
                        text: text,
                        timestamp: Date.now(),
                        replies: []
                    };
                    post.comments.push(comment);
                    savePosts();
                    renderFotoPosts(currentFotoFilter);
                    input.value = '';
                    showToast('✅ Berhasil', 'Komentar ditambahkan!', 'fa-check-circle');
                });
            });
            
            // ENTER untuk komentar foto
            document.querySelectorAll('.foto-add-comment input').forEach(el => {
                el.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const btn = this.parentElement.querySelector('button');
                        if (btn) btn.click();
                    }
                });
            });
        }
